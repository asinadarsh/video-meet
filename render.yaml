services:
  - type: web
    name: video-meet-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///./zoom_clone.db
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000
      - key: PYTHON_VERSION
        value: 3.12.6
